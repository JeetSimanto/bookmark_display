<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booktab — Your Maximalist New Tab</title>
  <meta name="description" content="A neo-brutalist, maximalist New Tab workspace dashboard with bookmarks, widgets, and explosive aesthetics." />

  <!-- Design System Tokens -->
  <link rel="stylesheet" href="css/maximalist-tokens.css?v=1.1.1" />
  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="css/main.css?v=1.1.1" />
</head>
<body>
  <div class="app-container" id="app-container">

    <!-- ═══ HEADER BAR: Workspaces + Search ═══ -->
    <header class="header-bar" id="header-bar">
      <nav class="workspace-tabs" id="workspace-tabs" aria-label="Workspace navigation">
        <!-- Workspace tabs rendered by workspaces.js -->
      </nav>

      <div class="search-container">
        <input
          type="text"
          class="search-bar"
          id="search-bar"
          placeholder='SEARCH THE WEB... (press "/" to focus)'
          autocomplete="off"
          spellcheck="false"
          aria-label="Search the web"
        />
        <button class="settings-btn" id="settings-btn" title="Settings" aria-label="Settings">⚙️</button>
      </div>
    </header>

    <!-- ═══ MAIN GRID: Dense Mosaic Layout ═══ -->
    <main class="main-grid" id="main-grid" aria-label="Dashboard content">
      <!-- Bookmark collections and widgets rendered by JS modules -->
    </main>

  </div>

  <!-- Core App Engine (ES Module) -->
  <script type="module" src="js/app.js?v=1.1.1"></script>
</body>
</html>
